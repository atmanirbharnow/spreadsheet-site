<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earth Carbon Actions | Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>🌍 Earth Carbon Actions</h1>
    <p>Live dashboard of low-carbon interventions</p>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-card">
      <span class="number" id="total-actions">–</span>
      <span class="label">Total Actions</span>
    </div>
    <div class="stat-card">
      <span class="number" id="total-co2">–</span>
      <span class="label">tCO₂e Saved/Year</span>
    </div>
    <div class="stat-card">
      <span class="number" id="total-saved">–</span>
      <span class="label">₹ Saved</span>
    </div>
    <div class="stat-card">
      <span class="number" id="total-interventions">–</span>
      <span class="label">Intervention Types</span>
    </div>
  </div>

  <div class="container">
    <h2 class="section-title">📈 Annual tCO₂e Saved by Intervention</h2>
    <div class="chart-container">
      <canvas id="co2-chart"></canvas>
    </div>
  </div>

  <footer>
    <p>Powered by Earth Carbon Foundation</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earth Carbon Actions | Live Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PapaParse for CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <!-- Chart.js for graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
</head>
<body>
  <!-- Hero Header -->
  <header>
    <h1>🌍 Earth Carbon Actions</h1>
    <p>Live dashboard of verified low-carbon interventions and their impact</p>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card">
      <span class="number" id="total-actions">–</span>
      <span class="label">Total Actions</span>
    </div>
    <div class="stat-card">
      <span class="number" id="total-co2">–</span>
      <span class="label">tCO₂e Saved/Year</span>
    </div>
    <div class="stat-card">
      <span class="number" id="total-saved">–</span>
      <span class="label">₹ Saved to Date</span>
    </div>
    <div class="stat-card">
      <span class="number" id="total-interventions">–</span>
      <span class="label">Intervention Types</span>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    
    <!-- 🔍 Search & Filter Section -->
    <div class="controls-section">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 Search interventions (e.g., Solar, Biogas)..." />
        <button id="clear-search" class="btn-secondary">Clear</button>
      </div>
      <div class="filter-hints">
